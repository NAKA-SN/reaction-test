<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ 反应时间测试器</title>
    <meta http-equiv="refresh" content="0; url=reaction-time.html">
    <style>
        body {
            font-family: 'Arial', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
        }
        .card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }
        h1 {
            color: #667eea;
            font-size: 48px;
            margin-bottom: 20px;
        }
        p {
            color: #666;
            font-size: 20px;
            margin-bottom: 20px;
        }
        a {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 15px 40px;
            border-radius: 50px;
            text-decoration: none;
            font-size: 18px;
            margin-top: 20px;
            transition: all 0.3s ease;
        }
        a:hover {
            background: #764ba2;
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>⚡ 反应时间测试</h1>
        <p>正在跳转到游戏页面...</p>
        <p style="font-size: 16px; color: #999;">如果未自动跳转，请点击下方按钮</p>
        <a href="reaction-time.html">开始测试</a>
    </div>
</body>
</html>
